name: your_days
description: "365 dots. One for each day. How much of your year is left?"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.0
  flutter_svg: ^2.2.3
  flutter_native_splash: ^2.4.7

  # Storage
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0

  # Auth & encryption (Journal — Phase 3)
  local_auth: ^2.1.0
  encrypt: ^5.0.3
  crypto: ^3.0.0

  # Sharing (Weekly Word — Phase 4)
  share_plus: ^7.2.0

  # Date formatting & ISO week numbers
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_native_splash:
  color: "#FAF7F4"
  image: assets/icons/time.png

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/data/
